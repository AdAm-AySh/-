<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تحدي تخمين الأرقام الذكي - أدم</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a24;
      color: white;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .game-container {
      background: #252533;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      width: 360px;
      text-align: center;
    }
    input {
      width: 80%;
      padding: 10px;
      margin: 15px 0;
      border: 2px solid #444;
      border-radius: 6px;
      background: #1a1a24;
      color: white;
      font-size: 18px;
      text-align: center;
    }
    .guess-btn {
      padding: 10px 25px;
      background-color: #f1c40f;
      color: #1a1a24;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    .guess-btn:hover {
      background-color: #f39c12;
    }
    /* مكان ظهور رسائل النتيجة التفاعلية */
    #resultBox {
      margin-top: 20px;
      min-height: 50px;
    }
    /* كلاسات النتيجة اللي الجافاسكريبت هتضيفها ديناميكياً */
    .alert-card {
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      animation: pop 0.3s ease;
    }
    .success { background-color: #2ed573; color: white; }
    .wrong { background-color: #ff4757; color: white; }
    
    @keyframes pop {
      0% { transform: scale(0.8); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="game-container">
    <h2>لعبة تخمين الرقم السري 🧠</h2>
    <p>أنا اخترت رقم من 1 إلى 10، تفتكر هو كام؟</p>
    <p style="color: #aaa; font-size: 14px;">المحاولات المتبقية: <span id="attemptsCount" style="color: #f1c40f; font-weight: bold;">3</span></p>
    
    <input type="text" id="userNameInput" placeholder="اكتب اسمك هنا باللغة العربية">
    <input type="number" id="userInput" min="1" max="10" placeholder="اكتب رقمك هنا">
    <br>
    <button class="guess-btn" id="actionBtn" onclick="checkGuess()">تخمين!</button>
    
    <div id="resultBox"></div>
  </div>

  <script>
    let secretNumber = Math.floor(Math.random() * 10) + 1;
let attempts = 3;

function checkGuess() {
  let userInput = document.getElementById("userInput");
  let attemptsCount = document.getElementById("attemptsCount");
  let actionBtn = document.getElementById("actionBtn");
  let resultBox = document.getElementById("resultBox");
  let userNameInput = document.getElementById('userNameInput')
  let disabledColor = '#555'

  let userGuess = parseInt(userInput.value);

  let userName = userNameInput.value;

  if (userName === '' || typeof userName !== 'string') {
    alert('الرجاء كتابة اسمك')
    return;
  }

  if (isNaN(userGuess) || userGuess < 1 || userGuess > 10) {
    alert("الرجاء كتابة رقم صحيح من 1 إلى 10");
    return;
  }

  resultBox.innerHTML = "";

  let alertCard = document.createElement("div");
  alertCard.className = "alert-card";

  if (userGuess === secretNumber) {
    alertCard.textContent = `🏆 مبروك يا ${userName}! خمنت الرقم صح! 🎉`;
    alertCard.classList.add("success");
    actionBtn.disabled = true;
    actionBtn.style.backgroundColor = disabledColor;
  } else {
    attempts--;
    attemptsCount.textContent = attempts;

    if (attempts > 0) {
      if (userGuess > secretNumber) {
        alertCard.textContent = `❌ غلط يا ${userName}! رقمك أكبر من الرقم السري.`;
      } else {
        alertCard.textContent = `❌ غلط يا ${userName}! رقمك أصغر من الرقم السري.`;
      }
      alertCard.classList.add("wrong");
    } else{
        alertCard.textContent = `💥 خسرت يا${userName}! الرقم السري كان: ${secretNumber}. اعمل ريفريش وجرب تاني! 🔄`;
        alertCard.classList.add('wrong')
        actionBtn.disabled = true;
        actionBtn.style.backgroundColor = disabledColor;
    }
  }

  resultBox.appendChild(alertCard);
  userNameInput.disabled = true
  userNameInput.style.backgroundColor = disabledColor
  userInput.value = '';
}
  </script>
</body>
</html>
